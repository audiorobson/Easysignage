# Stack mínimo: Postgres + API Nest + CMS Next.
# Uso (na raiz): docker compose up --build
# Browser: CMS http://localhost:3000  |  API http://localhost:3001/api/v1  |  Health http://localhost:3001/api/v1/health
#
# Defina JWT_SECRET seguro (ex. ficheiro .env na raiz com JWT_SECRET=...).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: easysignage
      POSTGRES_PASSWORD: easysignage_dev
      POSTGRES_DB: easysignage
    volumes:
      - easysignage_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easysignage -d easysignage"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://easysignage:easysignage_dev@postgres:5432/easysignage
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-defina-JWT_SECRET-seguro-em-producao}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3010,http://127.0.0.1:3010
      CMS_ORIGIN: http://localhost:3000
      SWAGGER: "0"
      EASYSIGNAGE_HARDWARE_ID_FILE: /config/hardware.id
      EASYSIGNAGE_LICENSE_FILE: /config/license.key
      RT_GATEWAY_URL: http://realtime-gateway:3020
      RT_INTERNAL_SECRET: ${RT_INTERNAL_SECRET:-dev-rt-secret}
      REDIS_URL: redis://redis:6379
      STORAGE_ROOT: /app/uploads
    volumes:
      - ./config:/config:ro
      - easysignage_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-worker:
    build:
      context: .
      dockerfile: docker/media-worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://easysignage:easysignage_dev@postgres:5432/easysignage
      REDIS_URL: redis://redis:6379
      STORAGE_ROOT: /app/uploads
    volumes:
      - easysignage_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  realtime-gateway:
    build:
      context: .
      dockerfile: docker/realtime-gateway.Dockerfile
    ports:
      - "3020:3020"
    environment:
      RT_PORT: "3020"
      API_URL: http://api:3001/api/v1
      RT_INTERNAL_SECRET: ${RT_INTERNAL_SECRET:-dev-rt-secret}
    depends_on:
      - api

  cms:
    build:
      context: .
      dockerfile: docker/cms.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  easysignage_pg:
  easysignage_uploads:
