# EasySignage Server Box — pacote para mini PC (LAN)
# Pré-requisitos: Docker Desktop (Windows) ou Docker Engine (Linux)
#
# 1. Copie .env.example para .env e ajuste JWT_SECRET
# 2. Execute install.ps1 (Windows) ou install.sh (Linux) na raiz desta pasta
# 3. docker compose up -d
# 4. CMS: http://localhost:3000 — copie o Hardware ID em Definições → Licença
#
# Imagens GHCR (produção): defina EASYSIGNAGE_*_IMAGE no .env (ver .env.example)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-easysignage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-easysignage}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-easysignage} -d ${POSTGRES_DB:-easysignage}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  realtime-gateway:
    image: ${EASYSIGNAGE_RT_IMAGE:-easysignage-realtime-gateway:local}
    ports:
      - '3020:3020'
    environment:
      RT_PORT: '3020'
      API_URL: http://api:3001/api/v1
      RT_INTERNAL_SECRET: ${RT_INTERNAL_SECRET:?defina RT_INTERNAL_SECRET no .env}
      RT_WALL_TICK_MS: '1000'
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ${EASYSIGNAGE_API_IMAGE:-easysignage-api:local}
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easysignage}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-easysignage}
      PORT: '3001'
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CMS_ORIGIN: ${CMS_ORIGIN:-http://localhost:3000}
      SWAGGER: '0'
      RT_GATEWAY_URL: http://realtime-gateway:3020
      RT_INTERNAL_SECRET: ${RT_INTERNAL_SECRET}
      EASYSIGNAGE_HARDWARE_ID_FILE: /config/hardware.id
      EASYSIGNAGE_LICENSE_FILE: /config/license.key
      LICENSE_PUBLIC_KEY_FILE: /config/license-public.pem
      STORAGE_ROOT: /app/uploads
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data/uploads:/app/uploads
      - ./config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  cms:
    image: ${EASYSIGNAGE_CMS_IMAGE:-easysignage-cms:local}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

volumes: {}
