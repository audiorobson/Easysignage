<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>EasySignage Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    iframe {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
  <script src="js/command-dispatcher.js"></script>
  <script src="js/tizen-bridge.js"></script>
</head>
<body>
  <!--
    Kiosk: reaproveita o apps/web-player existente via iframe em vez de reimplementar o
    motor de playback — mesma estratégia do Electron/Android TV/webOS.
  -->
  <iframe id="player-frame" title="EasySignage Player" allow="autoplay; fullscreen"></iframe>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var playerUrl = params.get('playerUrl') || 'https://player.easysignage.example.com';
      document.getElementById('player-frame').src = playerUrl;

      // Botão de retorno do controlo remoto: em apps TV kiosk, normalmente deve fechar a
      // app (comportamento padrão do Tizen) em vez de navegar para trás no histórico.
      document.addEventListener('tizenhwkey', function (e) {
        if (e.keyName === 'back' && window.tizen && window.tizen.application) {
          window.tizen.application.getCurrentApplication().exit();
        }
      });
    })();
  </script>
</body>
</html>
