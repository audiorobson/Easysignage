name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: easysignage
          POSTGRES_PASSWORD: easysignage_dev
          POSTGRES_DB: easysignage
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://easysignage:easysignage_dev@localhost:5432/easysignage
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-not-for-production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @easysignage/api exec prisma generate

      - name: Apply migrations
        run: pnpm --filter @easysignage/api exec prisma migrate deploy

      - name: Build
        # Precisa correr antes dos testes: apps/api (ts-jest) resolve
        # @easysignage/shared-types e @easysignage/license-core via node_modules
        # (symlink do workspace pnpm) e exige que já exista dist/ com as
        # declarações de tipo — sem isto, os testes falham com TS2307 num
        # checkout limpo (sem build prévio).
        run: pnpm build

      - name: Test
        # apps/e2e depende de API + CMS já em execução (ver .github/workflows/e2e.yml,
        # que sobe os serviços antes de rodar os testes); aqui só os testes unitários
        # e de integração com banco/Redis efémeros.
        run: pnpm test -- --filter='!@easysignage/e2e'

      - name: Test license-core
        run: pnpm --filter @easysignage/license-core test
