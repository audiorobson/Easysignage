name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://easysignage:easysignage_dev@localhost:5432/easysignage
      JWT_SECRET: ci-jwt-secret-not-for-production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @easysignage/api exec prisma generate

      - name: Test
        run: pnpm test

      - name: Test license-core
        run: pnpm --filter @easysignage/license-core test

      - name: Build
        run: pnpm build
