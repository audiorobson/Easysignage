name: Fire TV Player

# PR 7.4 — smoke build isolado do apps/firetv-player (reaproveita a base do
# apps/androidtv-player). Só corre quando o módulo muda.
on:
  push:
    branches: [main]
    paths:
      - 'apps/firetv-player/**'
      - '.github/workflows/firetv.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/firetv-player/**'
      - '.github/workflows/firetv.yml'

concurrency:
  group: firetv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/firetv-player
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Unit tests do bridge (CommandDispatcher)
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Smoke build (assembleDebug)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: firetv-player-debug-apk
          path: apps/firetv-player/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
