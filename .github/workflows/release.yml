name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: docker/api.Dockerfile
            image: easysignage-api
          - name: cms
            dockerfile: docker/cms.Dockerfile
            image: easysignage-cms
          - name: realtime-gateway
            dockerfile: docker/realtime-gateway.Dockerfile
            image: easysignage-realtime-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Pre-build workspace packages
        run: pnpm install --frozen-lockfile && pnpm prod:test:packages

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.name == 'cms' && 'NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1' || '' }}

  server-box-zip:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build server box ZIP
        run: node deploy/release/build-server-box-zip.mjs
        env:
          EASYSIGNAGE_VERSION: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: easysignage-server-box-${{ github.ref_name }}
          path: dist/release/*.zip
